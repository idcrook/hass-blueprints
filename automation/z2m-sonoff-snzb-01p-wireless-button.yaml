blueprint:
  name: Z2M - Sonoff SNZB-01P Zigbee Wireless Switch
  description: Automate your Sonoff SNZB-01 Zigbee Wireless Switch via Zigbee2MQTT. Adapted from a similar aqara automation, but dropping 'release' action
  domain: automation
  input:
    input_device_id:
      name: Device Name
      description: Device used to trigger actions
      selector:
        device:
          entity:
            - integration: mqtt
              domain:
                - sensor
          multiple: false
    press_single:
      name: Single button press
      description: Action to run on single button press
      default: []
      selector:
        action: {}
    press_double:
      name: Double button press
      description: Action to run on double button press
      default: []
      selector:
        action: {}
    press_long:
      name: Button long press
      description: Action to run on long press
      default: []
      selector:
        action: {}
  source_url: https://github.com/idcrook/hass-blueprints/blob/main/automation/z2m-sonoff-snzb-01p-wireless-button.yaml
    # https://gist.github.com/denselm/5049daf0d2812c8b6ae9a6dc298f471c
mode: restart
max_exceeded: silent
triggers:
- domain: mqtt
  device_id: !input input_device_id
  type: action
  subtype: single
  trigger: device
  id: single
- domain: mqtt
  device_id: !input input_device_id
  type: action
  subtype: double
  trigger: device
  id: double
- domain: mqtt
  device_id: !input input_device_id
  type: action
  subtype: long
  trigger: device
  id: long
actions:
- if:
    - condition: trigger
      id:
        - single
  then:
    - sequence: !input press_single
- if:
    - condition: trigger
      id:
        - double
  then:
    - sequence: !input press_double
- if:
    - condition: trigger
      id:
        - long
  then:
    - sequence: !input press_long

